<html>
<head>
    <title>Monopoly Picker</title>
    <script>
        function playSound(eventType) {
            const audio = new Audio();
            switch (eventType) {
                case 'dice':
                    audio.src = 'sounds/dice-roll.mp3';
                    break;
                case 'win':
                    audio.src = 'sounds/win.mp3';
                    break;
                case 'chance':
                    audio.src = 'sounds/chance.mp3';
                    break;
                case 'fate':
                    audio.src = 'sounds/fate.mp3';
                    break;
                default:
                    return;
            }
            audio.play();
        }
    </script>
</head>
<body>
    <h1>Welcome to Monopoly Picker!</h1>

    <!-- Example of triggering sound: -->
    <button onclick="playSound('dice')">Roll Dice</button>
    <button onclick="playSound('win')">Win</button>

    <!-- Add your game's HTML here -->
</body>
</html>
