<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大富翁抽籤系統byDigitalTeacherHK</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --board-bg: #cde6d0;
            --center-bg: #fbf8ef;
            --border-color: #111;
            --monopoly-red: #e63946;
            --monopoly-blue: #0072bb;
            --monopoly-green: #1fb25a;
            --monopoly-purple: #8b5cf6;
            --monopoly-yellow: #ffb703;
            --font-zh: 'GenWanMin', 'Microsoft JhengHei', system-ui, sans-serif;
            --font-en: 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            /* 使用 bg.png 作為整頁背景圖片 */
            background-image: url('./bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--board-bg); /* 圖片載入前的底色 */
            color: #000;
            font-family: var(--font-zh);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 12px 0 16px;
            touch-action: manipulation;
        }

        /* 遊戲主體 */
        #board-container {
            position: relative;
            width: 95vw;
            height: 53.4vw;
            max-width: 1200px;
            max-height: 675px;
            display: grid;
            gap: 2px;
            background: var(--border-color);
            border: 4px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .cell {
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            transition: all 0.1s;
            overflow: hidden;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            z-index: 5;
        }

        .house-container {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 2px;
            pointer-events: none;
        }

        .house-icon {
            display: inline-block;
        }

        .house-img {
            height: clamp(14px, 3vmin, 28px);
            width: auto;
            display: block;
        }

        .cell-text {
            padding: 0px;
            font-size: clamp(5px, 3vmin, 40px);
            color: #111;
            word-break: break-word;
            line-height: 1.2;
            font-weight: bold;
        }

        .cell.chance { background: #ffebcc; }
        .cell.chance .cell-text { color: #d97706; }

        .cell.fate { background: #ffe6e6; }
        .cell.fate .cell-text { color: #dc2626; }

        .cell.active {
            border: 4px solid var(--monopoly-red);
            box-shadow: inset 0 0 12px var(--monopoly-red);
            transform: scale(1.08);
            z-index: 15 !important;
            background: #fff0f0 !important;
        }

        /* 中央控制區 */
        #center-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--center-bg);
            border: 2px solid var(--border-color);
            margin: 5px;
            padding: 10px 20px;
            position: relative;
            text-align: center;
            z-index: 1;
        }

        /* ======== 右上角控制區（音量＋歷史＋設定） ======== */
        .top-right-controls {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            z-index: 20;
        }
        .top-right-row,
        .bottom-right-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ======== 左上角工具區（大風吹＋順序重設） ======== */
        .top-left-tools {
            position: absolute;
            top: 10px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 20;
        }

        /* 音訊控制按鈕本身 */
        .audio-controls {
            display: flex;
            gap: 8px;
        }
        .audio-btn {
            background: #fff;
            border: 2px solid #000;
            border-radius: 8px;
            cursor: pointer;
            padding: 5px 8px;
            font-size: 18px;
            box-shadow: 2px 2px 0px #000;
            transition: 0.1s;
        }
        .audio-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }
        .audio-btn.on {
            background: var(--monopoly-green);
            color: #fff;
        }
        .audio-btn.off {
            background: #4b5563;
            color: #e5e7eb;
            opacity: 0.9;
        }

        .logo-text {
            background: var(--monopoly-red);
            color: #fff;
            padding: 8px 20px;
            font-size: clamp(18px, 4vmin, 40px);
            transform: rotate(-3deg);
            border: 3px solid #000;
            box-shadow: 5px 5px 0px #000;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .logo-image {
            width: min(90%, 500px);
            height: auto;
            display: block;
            margin-bottom: 15px;
        }

        #status-text {
            font-size: clamp(14px, 2.5vmin, 24px);
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
            min-height: 3vmin;
        }

        /* 狀態顏色分類 */
        #status-text.status-normal { color: #374151; }
        #status-text.status-success { color: #15803d; }
        #status-text.status-info { color: #2563eb; }
        #status-text.status-warning { color: #b45309; }
        #status-text.status-danger { color: #b91c1c; }

        /* 目前玩家與提示文字 */
        #current-player {
            font-size: clamp(14px, 2.2vmin, 22px);
            margin-bottom: 4px;
            font-weight: bold;
            color: #111;
            min-height: 2.5vmin;
        }
        #hint-text {
            font-size: clamp(10px, 1.5vmin, 14px);
            color: #6b7280;
            margin-bottom: 10px;
        }

        #dice-container { display: flex; gap: 15px; margin-bottom: 15px; }
        .dice {
            width: clamp(40px, 6vmin, 60px);
            height: clamp(40px, 6vmin, 60px);
            background: white; color: var(--monopoly-red);
            font-size: clamp(20px, 4vmin, 35px); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            border: 3px solid #000; box-shadow: 3px 3px 0px #000;
            font-weight: bold;
        }

        /* 主要操作按鈕區（擲骰子／快速抽籤） */
        .btn-main-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
            width: 100%;
            margin-bottom: 8px;
        }

        /* 放大的擲骰子按鈕（置中顯眼） */
        #btn-roll {
            min-width: 210px;
            padding: 8px 8px;
            font-size: clamp(18px, 4vmin, 40px);
        }

        /* 縮小版快速抽籤，排在擲骰子下方 */
        #btn-marquee {
            min-width: 100px;
            padding: 5px 5px;
            font-size: clamp(10px, 2vmin, 16px);
        }

        /* 次要工具列（大風吹／重設／歷史／設定） */
        .btn-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            z-index: 10;
            width: 100%;
        }

        button {
            cursor: pointer;
            padding: 10px 18px;
            font-size: clamp(12px, 1.8vmin, 18px);
            font-weight: bold; border: 2px solid #000; box-shadow: 3px 3px 0px #000;
            transition: 0.2s;
            border-radius: 6px;
        }
        button:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px #000; }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000; }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: 0 0 0 #000;
            transform: none !important;
        }

        .btn-settings { background: var(--monopoly-blue); color: white; }
        .btn-roll { background: var(--monopoly-red); color: white; }
        .btn-marquee { background: #ffebcc; }
        .btn-shuffle { background: #eee; }
        .btn-reset { background: var(--monopoly-purple); color: white; }
        .btn-history { background: var(--monopoly-yellow); color: #000; }

        /* 小圖示按鈕（工具列用） */
        .icon-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 設定介面 Modal & 歷史紀錄 Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #fff;
            width: 85%; max-width: 700px; padding: 25px; border-radius: 12px;
            max-height: 85vh; overflow-y: auto; border: 4px solid #000;
        }

        .cloud-section {
            background: #f0f7ff;
            padding: 15px; border: 2px dashed var(--monopoly-blue);
            margin-bottom: 20px; border-radius: 8px; text-align: left;
        }
        .code-display {
            font-size: 22px;
            color: var(--monopoly-red); letter-spacing: 2px;
            background: #fff; padding: 5px 15px; border: 2px solid #000; font-family: monospace;
        }

        textarea { width: 100%; height: 80px; margin: 8px 0 15px 0; border: 2px solid #000; padding: 10px; font-size: 14px; box-sizing: border-box; }
        select { font-size: 16px; padding: 5px; margin-bottom: 15px; border: 2px solid #000; font-weight: bold; }
        .modal-footer { text-align: right; margin-top: 10px; border-top: 2px solid #eee; padding-top: 15px; }

        /* 歷史紀錄清單 */
        #history-list {
            list-style: none;
            padding: 0; margin: 0; text-align: left;
            max-height: 50vh; overflow-y: auto;
        }
        #history-list li {
            padding: 10px;
            border-bottom: 1px dashed #ccc; font-size: 16px; font-weight: bold;
        }
        #history-list li.history-item {
            padding-left: 14px;
            border-left: 4px solid transparent;
        }
        #history-list li.history-winner { border-left-color: var(--monopoly-blue); }
        #history-list li.history-chance { border-left-color: #d97706; }
        #history-list li.history-fate { border-left-color: #dc2626; }
        #history-list li.history-house { border-left-color: var(--monopoly-green); }

        .history-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }
        .btn-clear-history {
            position: absolute;
            right: 0;
            background: #f97373;
            color: #fff;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 999px;
            border: 2px solid #000;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
        }
        #history-list li span.time { color: #666; font-size: 12px; margin-right: 10px; font-weight: normal;}

        /* ======== 抽籤結果彈出視窗 ======== */
        #result-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .result-content {
            background: #fff;
            width: 80%; max-width: 500px; padding: 40px; border-radius: 20px;
            text-align: center; border: 6px solid #000; box-shadow: 10px 10px 0px #000;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-title { font-size: clamp(24px, 3.5vmin, 40px); font-weight: bold; margin-bottom: 20px; color: #333; }
        .result-name { font-size: clamp(36px, 7vmin, 80px); font-weight: bold; color: var(--monopoly-blue); margin: 30px 0; word-break: break-word;}
        .result-text { font-size: clamp(20px, 4vmin, 40px); font-weight: bold; margin: 30px 0; }
        .btn-close-result {
            background: var(--monopoly-red);
            color: white; padding: 12px 30px; font-size: clamp(16px, 2.5vmin, 24px);
            margin-top: 20px; border: 3px solid #000; box-shadow: 4px 4px 0px #000;
            cursor: pointer; font-weight: bold;
        }
        .btn-close-result:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }
        .btn-close-result:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .result-house-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-house {
            background: var(--monopoly-green);
            color: #fff;
            padding: 8px 14px;
            font-size: clamp(12px, 2vmin, 18px);
            font-weight: bold;
            border: 2px solid #000;
            border-radius: 6px;
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
        }

        .btn-house-wrong {
            background: #ccc;
            color: #000;
        }

        /* ======== 登入系統 ======== */
        #auth-overlay {
            width: 95vw;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 10px;
            z-index: 30;
            font-family: var(--font-zh);
        }
        #auth-overlay.hidden { display: none; }

        .auth-card {
            background: rgba(255, 255, 255, 0.96);
            width: 100%;
            max-width: 760px;
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            border: 3px solid #000;
            text-align: center;
        }
        .auth-card h2 {
            font-size: clamp(20px, 3vmin, 30px);
            margin-bottom: 6px;
            color: #1a1a2e;
        }
        .auth-card .subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 14px;
        }
        .auth-input-group {
            text-align: left; margin-bottom: 16px;
        }
        .auth-input-group label {
            display: block; font-size: 13px; font-weight: bold;
            color: #333; margin-bottom: 6px;
        }
        .auth-input-group input {
            width: 100%; padding: 12px 14px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 15px; box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .auth-input-group input:focus {
            outline: none; border-color: var(--monopoly-blue);
        }
        .auth-btn {
            width: 100%; padding: 14px; font-size: 16px;
            font-weight: bold; color: #fff; border: none;
            border-radius: 8px; cursor: pointer; margin-top: 8px;
            transition: opacity 0.2s;
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .auth-btn-primary { background: var(--monopoly-blue); }
        .auth-btn-secondary { background: #6c757d; }
        .auth-toggle {
            margin-top: 20px; font-size: 13px; color: #666;
        }
        .auth-toggle a {
            color: var(--monopoly-blue); cursor: pointer;
            text-decoration: underline; font-weight: bold;
        }
        .auth-error {
            color: var(--monopoly-red); font-size: 13px;
            margin-top: 10px; min-height: 20px;
        }
        .auth-success {
            color: var(--monopoly-green); font-size: 13px;
            margin-top: 10px; min-height: 20px;
        }

        /* 使用者狀態列 */
        #user-bar {
            position: fixed;
            top: 8px; right: 12px;
            display: flex; align-items: center; gap: 8px;
            z-index: 100;
            font-size: 12px;
            background: rgba(255,255,255,0.92);
            padding: 5px 12px; border-radius: 20px;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
        }
        #user-bar.hidden { display: none; }
        #user-bar .user-email {
            color: #333; font-weight: bold;
            max-width: 160px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        #user-bar button {
            padding: 4px 10px; font-size: 11px;
            min-width: auto; border-radius: 12px;
            box-shadow: 1px 1px 0 #000;
        }

        /* 雲端同步狀態指示 */
        .sync-indicator {
            font-size: 11px; color: #666;
            display: flex; align-items: center; gap: 4px;
        }
        .sync-indicator.saving { color: #d97706; }
        .sync-indicator.saved { color: var(--monopoly-green); }
        .sync-indicator.error { color: var(--monopoly-red); }

        /* ======== 班別選擇器 ======== */
        .class-selector {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 10px; flex-wrap: wrap;
            justify-content: center;
        }
        .class-selector select {
            font-size: 13px; padding: 4px 8px;
            border: 2px solid #000; border-radius: 6px;
            font-weight: bold; margin-bottom: 0;
            max-width: 140px;
        }
        .class-selector button {
            padding: 4px 8px; font-size: 12px;
            min-width: auto; border-radius: 6px;
            box-shadow: 2px 2px 0 #000;
        }
        .class-selector .btn-new-class {
            background: var(--monopoly-green); color: #fff;
        }
        .class-selector .btn-del-class {
            background: var(--monopoly-red); color: #fff;
        }

        /* ======== 響應式設計 (RWD) ======== */
        @media (max-width: 768px), (max-aspect-ratio: 1/1) {
            body {
                padding-top: 8px;
            }
            #board-container {
                width: 98vw;
                height: 90vw;
                max-height: 800px;
            }
            #auth-overlay {
                width: 98vw;
                margin-bottom: 8px;
            }
            .auth-card {
                padding: 14px 12px;
            }
            #center-area { padding: 8px; }
            /* 手機上維持縱向排列，只微調內距 */
            .btn-main-group button { width: auto; }
            .btn-toolbar {
                overflow-x: auto;
                justify-content: flex-start;
            }
            .modal-content { width: 95%; padding: 15px; }
            .modal-footer { display: flex; flex-direction: column; gap: 10px; }
            .modal-footer button { width: 100%; }
        }
    </style>
</head>
<body>

<!-- 登入系統 -->
<div id="auth-overlay">
    <div class="auth-card">
        <h2>🎲 大富翁抽籤系統</h2>
        <p class="subtitle">Monopoly Picker by DigitalTeacherHK</p>
        <p class="subtitle">登入後，🔓解鎖班別、機會、命運和房屋存儲功能</p>
        
        <!-- 登入表單 -->
        <div id="auth-login-form">
            <div class="auth-input-group">
                <label>📧 Email</label>
                <input type="email" id="login-email" placeholder="teacher@school.edu.hk" autocomplete="email">
            </div>
            <div class="auth-input-group">
                <label>🔒 密碼 Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="auth-btn auth-btn-primary" id="btn-login" onclick="handleLogin()">登入 Login</button>
            <button class="auth-btn auth-btn-secondary" style="margin-top:8px" onclick="handleGuestEntry()">訪客模式 Guest Mode</button>
            <div class="auth-toggle">
                還沒有帳號？ <a onclick="showAuthForm('register')">立即註冊 Register</a>
            </div>
            <div class="auth-error" id="login-error"></div>
        </div>

        <!-- 註冊表單 -->
        <div id="auth-register-form" style="display:none">
            <div class="auth-input-group">
                <label>📧 Email</label>
                <input type="email" id="register-email" placeholder="teacher@school.edu.hk" autocomplete="email">
            </div>
            <div class="auth-input-group">
                <label>🔒 密碼 Password (至少6位)</label>
                <input type="password" id="register-password" placeholder="••••••••" autocomplete="new-password">
            </div>
            <div class="auth-input-group">
                <label>🔒 確認密碼 Confirm Password</label>
                <input type="password" id="register-password-confirm" placeholder="••••••••" autocomplete="new-password">
            </div>
            <button class="auth-btn auth-btn-primary" id="btn-register" onclick="handleRegister()">註冊 Register</button>
            <div class="auth-toggle">
                已有帳號？ <a onclick="showAuthForm('login')">返回登入 Login</a>
            </div>
            <div class="auth-error" id="register-error"></div>
            <div class="auth-success" id="register-success"></div>
        </div>
    </div>
</div>

<!-- 使用者狀態列 -->
<div id="user-bar" class="hidden">
    <span class="user-email" id="user-email-display"></span>
    <select id="class-select-bar" onchange="switchClass(this.value)" style="font-size:11px; padding:2px 4px; border:1px solid #999; border-radius:4px; font-weight:bold; max-width:100px;"></select>
    <span class="sync-indicator" id="sync-status"></span>
    <button class="btn-settings" style="font-size:11px" onclick="handleLogout()">登出</button>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 data-i18n="modalTitle">🛠️ 系統設定</h2>

        <div class="cloud-section" id="cloud-section-auth">
            <label><b>☁️ <span data-i18n="cloudTitleAuth">雲端同步 (自動)</span></b></label><br>
            <p style="font-size:13px; color:#555; margin:8px 0;" id="cloud-auth-status">

<script>

    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvZW9nZmRmdndqeXVzeGtweHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY5NjYsImV4cCI6MjA4ODQ1Mjk2Nn0.yHcvjaqYIvUnwUa-hbl1WxJ1L93_WRlgfKxw9d9yxRE';

            classManageTitle: "Class Management"
        }
    };

    let currentLang = 'zh';
    let originalStudents = Array.from({length: 24}, (_, i) => ({ id: i+1, name: `學生${i+1}` }));
    let students = JSON.parse(JSON.stringify(originalStudents));
    let chanceList = ["下一位抽到的同學可免答並直接加1分", "下一位抽到的同學可指定同學代答", "下一位抽到的同學答對，全班加1分", "下一位抽到的同學回答時，可獲得提示"];
    let fateList = ["下一位抽到的同學需使用英文作答", "下一位抽到的同學答錯，全班扣1分", "下一位抽到的同學需邊跳邊回答", "下一位抽到的同學答錯，需扣雙倍分數"];

    let mapData = [];
    let historyData = [];
    let currentIndex = 0;
    let isAnimating = false;
    let boardW = 0, boardH = 0;
    let studentHouses = {};

    // ==========================================
    // 認證系統
    // ==========================================
    function showAuthForm(mode) {
        document.getElementById('auth-login-form').style.display = mode === 'login' ? 'block' : 'none';
        document.getElementById('auth-register-form').style.display = mode === 'register' ? 'block' : 'none';
        document.getElementById('login-error').textContent = '';
        document.getElementById('register-error').textContent = '';
        document.getElementById('register-success').textContent = '';
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        const btn = document.getElementById('btn-login');

        if (!email || !password) { errEl.textContent = '請輸入 Email 和密碼'; return; }

        btn.disabled = true;
        btn.textContent = '登入中...';
        errEl.textContent = '';

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        btn.disabled = false;
        btn.textContent = '登入 Login';

        if (error) {
            errEl.textContent = error.message;
            return;
        }

        currentUser = data.user;
        onAuthSuccess();
    }

    async function handleRegister() {
        const email = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-password-confirm').value;
        const errEl = document.getElementById('register-error');
        const successEl = document.getElementById('register-success');
        const btn = document.getElementById('btn-register');

        errEl.textContent = '';
        successEl.textContent = '';

        if (!email || !password) { errEl.textContent = '請輸入 Email 和密碼'; return; }
        if (password.length < 6) { errEl.textContent = '密碼至少需要 6 個字元'; return; }
        if (password !== confirmPassword) { errEl.textContent = '兩次密碼不一致'; return; }

        btn.disabled = true;
        btn.textContent = '註冊中...';

        const { data, error } = await sb.auth.signUp({ email, password });

        btn.disabled = false;
        btn.textContent = '註冊 Register';

        if (error) {
            errEl.textContent = error.message;
            return;
        }

        if (data.user && data.session) {
            currentUser = data.user;
            onAuthSuccess();
        } else if (data.user) {
            const loginResult = await sb.auth.signInWithPassword({ email, password });
            if (loginResult.data && loginResult.data.user) {
                currentUser = loginResult.data.user;
                onAuthSuccess();
            } else {
                successEl.textContent = '✅ 註冊成功！請登入。';
            }
        } else {
            errEl.textContent = '註冊失敗，請重試。';
        }
    }

    function handleGuestEntry() {
        currentUser = null;
        document.getElementById('user-bar').classList.add('hidden');
        updateCloudStatusText();
        initGame();
    }

    async function handleLogout() {
        await sb.auth.signOut();
        currentUser = null;
        classList = [];
        currentClassName = '預設班級';
        document.getElementById('auth-overlay').classList.remove('hidden');
        document.getElementById('user-bar').classList.add('hidden');
        showAuthForm('login');
    }

    async function onAuthSuccess() {
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('user-bar').classList.remove('hidden');
        document.getElementById('user-email-display').textContent = currentUser.email;
        updateCloudStatusText();
        await loadClassList();
        currentClassName = classList[0] || '預設班級';
        refreshClassSelectors();
        await loadUserSettings();
        initGame();
    }

    function updateCloudStatusText() {
        const el = document.getElementById('cloud-auth-status');
        if (!el) return;
        el.textContent = currentUser ? i18n[currentLang].cloudLoggedIn : i18n[currentLang].cloudGuest;
    }

    // ==========================================
    // Supabase 資料同步
    // ==========================================
    function setSyncStatus(status, text) {
        const el = document.getElementById('sync-status');
        if (!el) return;
        el.className = 'sync-indicator ' + status;
        el.textContent = text;
    }

    async function loadClassList() {
        if (!currentUser) return;

        const { data, error } = await sb
            .from('user_settings')
            .select('class_name')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: true });

        if (error) {
            console.error('Load class list error:', error);
            classList = ['預設班級'];
        } else if (data && data.length > 0) {
            classList = data.map(d => d.class_name);
        } else {
            classList = ['預設班級'];
        }

        refreshClassSelectors();
    }

    function refreshClassSelectors() {
        const selectors = [
            document.getElementById('class-select-bar'),
            document.getElementById('class-select-settings')
        ];
        selectors.forEach(sel => {
            if (!sel) return;
            sel.innerHTML = '';
            classList.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === currentClassName) opt.selected = true;
                sel.appendChild(opt);
            });
        });
    }

    async function switchClass(className) {
        if (className === currentClassName) return;
        if (!currentUser) return;

        clearTimeout(_saveTimer);
        currentClassName = className;
        refreshClassSelectors();
        await loadUserSettings();
        initGame();
    }

    async function createNewClass() {
        const input = document.getElementById('input-new-class-name');
        let name = input ? input.value.trim() : '';
        if (!name) {
            name = prompt(currentLang === 'en' ? 'Enter new class name:' : '請輸入新班別名稱：');
        }
        if (!name) return;

        if (classList.includes(name)) {
            alert(currentLang === 'en' ? 'This class name already exists!' : '此班別名稱已存在！');
            return;
        }

        if (!currentUser) {
            alert(currentLang === 'en' ? 'Please log in first.' : '請先登入。');
            return;
        }

        setSyncStatus('saving', '⏳ 建立中...');

        const defaults = getDefaultGameState();
        const payload = {
            user_id: currentUser.id,
            class_name: name,
            students: defaults.students,
            chance_list: defaults.chanceList,
            fate_list: defaults.fateList,
            student_houses: {},
            history_data: [],
            language: currentLang,
            updated_at: new Date().toISOString()
        };

        const { error } = await sb.from('user_settings').insert(payload);

        if (error) {
            console.error('Create class error:', error);
            setSyncStatus('error', '❌ 建立失敗');
            return;
        }

        classList.push(name);
        currentClassName = name;
        refreshClassSelectors();
        applyGameState(defaults);
        initGame();
        setSyncStatus('saved', '✅ 已建立');
        if (input) input.value = '';
    }

    async function deleteCurrentClass() {
        if (!currentUser) return;
        if (classList.length <= 1) {
            alert(currentLang === 'en' ? 'Cannot delete the last class.' : '無法刪除最後一個班別。');
            return;
        }
        const msg = currentLang === 'en'
            ? `Delete class "${currentClassName}"? This cannot be undone.`
            : `確定刪除「${currentClassName}」？此操作無法復原。`;
        if (!confirm(msg)) return;

        setSyncStatus('saving', '⏳ 刪除中...');

        const { error } = await sb
            .from('user_settings')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('class_name', currentClassName);

        if (error) {
            console.error('Delete class error:', error);
            setSyncStatus('error', '❌ 刪除失敗');
            return;
        }

        classList = classList.filter(n => n !== currentClassName);
        currentClassName = classList[0];
        refreshClassSelectors();
        await loadUserSettings();
        initGame();
        setSyncStatus('saved', '✅ 已刪除');
    }

    async function renameCurrentClass() {
        if (!currentUser) return;
        const input = document.getElementById('input-new-class-name');
        const newName = input ? input.value.trim() : '';
        if (!newName) {
            alert(currentLang === 'en' ? 'Please enter a new name.' : '請輸入新名稱。');
            return;
        }
        if (newName === currentClassName) return;
        if (classList.includes(newName)) {
            alert(currentLang === 'en' ? 'This class name already exists!' : '此班別名稱已存在！');
            return;
        }

        setSyncStatus('saving', '⏳ 更新中...');

        const { error } = await sb
            .from('user_settings')
            .update({ class_name: newName, updated_at: new Date().toISOString() })
            .eq('user_id', currentUser.id)
            .eq('class_name', currentClassName);

        if (error) {
            console.error('Rename class error:', error);
            setSyncStatus('error', '❌ 重新命名失敗');
            return;
        }

        const idx = classList.indexOf(currentClassName);
        if (idx >= 0) classList[idx] = newName;
        currentClassName = newName;
        refreshClassSelectors();
        setSyncStatus('saved', '✅ 已更新');
        if (input) input.value = '';
    }

    function getDefaultGameState() {
        return {
            students: Array.from({length: 24}, (_, i) => ({ id: i+1, name: `學生${i+1}` })),
            chanceList: ["下一位抽到的同學可免答並直接加1分", "下一位抽到的同學可指定同學代答", "下一位抽到的同學答對，全班加1分", "下一位抽到的同學回答時，可獲得提示"],
            fateList: ["下一位抽到的同學需使用英文作答", "下一位抽到的同學答錯，全班扣1分", "下一位抽到的同學需邊跳邊回答", "下一位抽到的同學答錯，需扣雙倍分數"]
        };
    }

    function applyGameState(state) {
        originalStudents = JSON.parse(JSON.stringify(state.students));
        students = JSON.parse(JSON.stringify(originalStudents));
        chanceList = state.chanceList || getDefaultGameState().chanceList;
        fateList = state.fateList || getDefaultGameState().fateList;
        studentHouses = {};
        historyData = [];
        currentIndex = 0;
    }

    async function loadUserSettings() {
        if (!currentUser) return;
        setSyncStatus('saving', '⏳ 載入中...');

        const { data, error } = await sb
            .from('user_settings')
            .select('*')
            .eq('user_id', currentUser.id)
            .eq('class_name', currentClassName)
            .maybeSingle();

        if (error) {
            console.error('Load settings error:', error);
            setSyncStatus('error', '❌ 載入失敗');
            return;
        }

        if (data) {
            if (data.students && data.students.length >= 8) {
                originalStudents = data.students;
                students = JSON.parse(JSON.stringify(originalStudents));
            }
            if (data.chance_list && data.chance_list.length > 0) chanceList = data.chance_list;
            if (data.fate_list && data.fate_list.length > 0) fateList = data.fate_list;
            if (data.student_houses) studentHouses = data.student_houses;
            if (data.history_data) historyData = data.history_data;
            if (data.language) currentLang = data.language;

            document.getElementById('input-students').value = originalStudents.map(s => `${s.id},${s.name}`).join('\n');
            document.getElementById('input-chance').value = chanceList.join('\n');
            document.getElementById('input-fate').value = fateList.join('\n');
            document.getElementById('lang-select').value = currentLang;

            setSyncStatus('saved', '✅ 已同步');
        } else {
            setSyncStatus('saved', '🆕 新用戶');
        }
    }

    async function saveUserSettings() {
        if (!currentUser) return;
        setSyncStatus('saving', '⏳ 儲存中...');

        const payload = {
            user_id: currentUser.id,
            class_name: currentClassName,
            students: originalStudents,
            chance_list: chanceList,
            fate_list: fateList,
            student_houses: studentHouses,
            history_data: historyData,
            language: currentLang,
            updated_at: new Date().toISOString()
        };

        const { error } = await sb
            .from('user_settings')
            .upsert(payload, { onConflict: 'user_id,class_name' });

        if (error) {
            console.error('Save settings error:', error);
            setSyncStatus('error', '❌ 儲存失敗');
        } else {
            setSyncStatus('saved', '✅ 已同步');
        }
    }

    function debouncedSave() {
        if (!currentUser) return;
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => saveUserSettings(), 1500);
    }

    // ==========================================
    // 音效系統設定
    // ==========================================
    const sounds = {
        click: new Audio('./sounds/click.mp3'),
        roll: new Audio('./sounds/roll.mp3'),
        step: new Audio('./sounds/step.mp3'),
        win: new Audio('./sounds/win.mp3'),
        fate: new Audio('./sounds/fate.mp3'),
        bgm: new Audio('./sounds/bgm.mp3'),
        spin: new Audio('./sounds/spin.mp3'),
        blow: new Audio('./sounds/blow.mp3')
    };

    sounds.bgm.loop = true;
    sounds.bgm.volume = 0.3;

    let isBgmEnabled = true;
    let isSfxEnabled = true;

    function toggleBGM() {
        isBgmEnabled = !isBgmEnabled;
        if (isBgmEnabled) {
            sounds.bgm.play().catch(e => console.log(e));
        } else {
            sounds.bgm.pause();
        }
        refreshAudioButtons();
    }

    function toggleSFX() {
        isSfxEnabled = !isSfxEnabled;
        if (!isSfxEnabled) {
            sounds.spin.pause();
        }
        refreshAudioButtons();
    }

    function playSfx(name) {
        if (!isSfxEnabled) return;
        if(sounds[name]) {
            sounds[name].currentTime = 0;
            sounds[name].play().catch(e => console.log("播放被阻擋:", e));
        }
    }

    function startSpinSound() {
        if (!isSfxEnabled) return;
        sounds.spin.currentTime = 0;
        sounds.spin.loop = true;
        sounds.spin.play().catch(e => console.log("播放被阻擋:", e));
    }
    function stopSpinSound() {
        sounds.spin.pause();
        sounds.spin.currentTime = 0;
    }

    function unlockAudio() {
        Object.values(sounds).forEach(audio => {
            if (audio !== sounds.bgm) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(e => {});
            }
        });
        if (isBgmEnabled) {
            sounds.bgm.play().catch(e => console.log("BGM 播放被阻擋:", e));
        }
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
    }

    function refreshAudioButtons() {
        const bgmBtn = document.getElementById('btn-bgm');
        const sfxBtn = document.getElementById('btn-sfx');
        if (bgmBtn) {
            bgmBtn.innerText = isBgmEnabled ? '🎵' : '🔇';
            bgmBtn.classList.toggle('on', isBgmEnabled);
            bgmBtn.classList.toggle('off', !isBgmEnabled);
        }
        if (sfxBtn) {
            sfxBtn.innerText = isSfxEnabled ? '🔊' : '🔈';
            sfxBtn.classList.toggle('on', isSfxEnabled);
            sfxBtn.classList.toggle('off', !isSfxEnabled);
        }
    }

    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);

    // ==========================================
    // 遊戲邏輯
    // ==========================================
    function initGame() {
        document.getElementById('input-students').value = originalStudents.map(s => `${s.id},${s.name}`).join('\n');
        document.getElementById('input-chance').value = chanceList.join('\n');
        document.getElementById('input-fate').value = fateList.join('\n');
        refreshAudioButtons();
        setControlsEnabled(true);
        changeLanguage(currentLang);
    }

    function toggleModal(show) {
        document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
    }

    function toggleHistory(show) {
        const modal = document.getElementById('history-modal');
        const list = document.getElementById('history-list');

        if (show) {
            list.innerHTML = '';
            if (historyData.length === 0) {
                list.innerHTML = `<li style="text-align: center; color: #666;">${i18n[currentLang].historyEmpty}</li>`;
            } else {
                historyData.forEach(entry => {
                    let li = document.createElement('li');
                    li.classList.add('history-item');
                    if (entry.type) {
                        li.classList.add(`history-${entry.type}`);
                    }
                    li.innerHTML = `<span class="time">${entry.time}</span> ${entry.text}`;
                    list.appendChild(li);
                });
            }
            modal.style.display = 'flex';
        } else {
            modal.style.display = 'none';
        }
    }

    function clearHistory() {
        historyData = [];
        toggleHistory(true);
        debouncedSave();
    }

    function saveSettings() {
        const rawStudents = document.getElementById('input-students').value.trim().split('\n');
        let parsed = [];

        rawStudents.forEach(line => {
            let tLine = line.trim();
            if(tLine === '') return;
            if(tLine.includes(',')) {
                let parts = tLine.split(',');
                parsed.push({ id: parts[0].trim(), name: parts[1].trim() || parts[0].trim() });
            } else {
                parsed.push({ id: tLine, name: tLine });
            }
        });

        if(parsed.length < 8 || parsed.length > 40) {
            alert(i18n[currentLang].alertCount);
            return false;
        }

        originalStudents = JSON.parse(JSON.stringify(parsed));
        students = JSON.parse(JSON.stringify(originalStudents));
        studentHouses = {};
        chanceList = document.getElementById('input-chance').value.trim().split('\n').filter(l => l);
        fateList = document.getElementById('input-fate').value.trim().split('\n').filter(l => l);

        currentIndex = 0;
        historyData = [];
        generateMap();
        renderBoard();
        return true;
    }

    function saveAndApply() {
        if (saveSettings()) {
            setStatus('success', i18n[currentLang].statusSaved);
            toggleModal(false);
            debouncedSave();
        }
    }

    function generateMap() {
        let N = students.length;
        let specialCount = 4;
        let totalCells = N + specialCount;
        if (totalCells % 2 !== 0) { specialCount++; totalCells++; }

        let targetSum = (totalCells + 4) / 2;
        boardW = Math.round(targetSum * 16 / 25);
        boardH = targetSum - boardW;
        if (boardH < 3) { boardH = 3; boardW = targetSum - 3; }

        mapData = [];
        let sIdx = 0;
        let specialIndices = [0, boardW - 1, boardW + boardH - 2, 2 * boardW + boardH - 3];
        const colors = ['#fdf6e3', '#e0f7fa', '#fce4ec', '#fff3e0', '#e8f5e9', '#fff9c4'];

        for (let i = 0; i < totalCells; i++) {
            if (specialIndices.includes(i)) {
                let isChance = i === specialIndices[0] || i === specialIndices[2];
                mapData.push({
                    type: isChance ? 'chance' : 'fate',
                    text: isChance ? i18n[currentLang].mapChance : i18n[currentLang].mapFate
                });
            } else {
                if(students[sIdx]) {
                    let colorIdx = sIdx % colors.length;
                    const stu = students[sIdx];
                    if (!studentHouses[stu.id]) {
                        studentHouses[stu.id] = { small: 0, middle: 0, large: 0 };
                    }
                    mapData.push({
                        type: 'student',
                        name: stu.name,
                        id: stu.id,
                        color: colors[colorIdx],
                        houses: studentHouses[stu.id]
                    });
                    sIdx++;
                } else {
                    mapData.push({ type: 'fate', text: i18n[currentLang].mapFate });
                }
            }
        }
    }

    function getGridPos(i, W, H) {
        if (i < W) return { col: i + 1, row: 1 };
        if (i < W + H - 2) return { col: W, row: i - W + 2 };
        if (i < 2 * W + H - 2) return { col: W - (i - (W + H - 2)), row: H };
        return { col: 1, row: H - 1 - (i - (2 * W + H - 2)) };
    }

    function getHouseIconsHTML(houses) {
        if (!houses) return '';
        const parts = [];
        for (let i = 0; i < (houses.small || 0); i++) {
            parts.push('<span class="house-icon"><img class="house-img" src="./smallhouse.png" alt="small house"></span>');
        }
        for (let i = 0; i < (houses.middle || 0); i++) {
            parts.push('<span class="house-icon"><img class="house-img" src="./middlehouse.png" alt="middle house"></span>');
        }
        for (let i = 0; i < (houses.large || 0); i++) {
            parts.push('<span class="house-icon"><img class="house-img" src="./largehouse.png" alt="large house"></span>');
        }
        if (!parts.length) return '';
        return `<div class="house-container">${parts.join('')}</div>`;
    }

    function renderBoard() {
        const board = document.getElementById('board-container');
        board.style.gridTemplateColumns = `repeat(${boardW}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${boardH}, 1fr)`;

        const centerArea = document.getElementById('center-area');
        centerArea.style.gridColumn = `2 / ${boardW}`;
        centerArea.style.gridRow = `2 / ${boardH}`;

        document.querySelectorAll('.cell').forEach(e => e.remove());
        mapData.forEach((data, i) => {
            const cell = document.createElement('div');
            cell.id = `cell-${i}`;
            cell.className = `cell ${data.type}`;

            if (data.type === 'student') {
                cell.style.backgroundColor = data.color;
                const housesHTML = getHouseIconsHTML(data.houses);
                cell.innerHTML = `<div class="cell-text">${data.name}</div>${housesHTML}`;
                cell.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openHouseEditor(data.id);
                });
            } else {
                cell.innerHTML = `<div class="cell-text">${data.text}</div>`;
            }

            let pos = getGridPos(i, boardW, boardH);
            cell.style.gridColumn = pos.col;
            cell.style.gridRow = pos.row;
            board.appendChild(cell);
        });
        updatePos();
    }

    function updatePos() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
        const activeCell = document.getElementById(`cell-${currentIndex}`);
        if(activeCell) activeCell.classList.add('active');
    }

    function rollDice() {
        if (isAnimating) return;
        playSfx('click');
        playSfx('roll');
        isAnimating = true;
        setControlsEnabled(false);
        closeResult();
        let s1 = Math.floor(Math.random() * 6) + 1;
        let s2 = Math.floor(Math.random() * 6) + 1;
        let count = 0;
        let timer = setInterval(() => {
            document.getElementById('dice1').innerText = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice2').innerText = Math.floor(Math.random() * 6) + 1;
            if(count++ > 10) {
                clearInterval(timer);
                document.getElementById('dice1').innerText = s1;
                document.getElementById('dice2').innerText = s2;
                startSpinSound();
                move(s1 + s2);
            }
        }, 50);
    }

    function startMarquee() {
        if (isAnimating) return;
        playSfx('click');
        isAnimating = true;
        setControlsEnabled(false);
        closeResult();
        startSpinSound();
        move(Math.floor(Math.random() * mapData.length) + mapData.length, true);
    }

    function move(steps, isMarquee = false) {
        if (steps <= 0) { land(); return; }
        currentIndex = (currentIndex + 1) % mapData.length;
        playSfx('step');
        updatePos();
        setTimeout(() => move(steps - 1, isMarquee), isMarquee ? 40 : 150);
    }

    function land() {
        stopSpinSound();

        const data = mapData[currentIndex];
        const modal = document.getElementById('result-modal');
        const box = document.getElementById('result-box');
        const title = document.getElementById('result-title');
        const display = document.getElementById('result-display');

        modal.style.display = 'flex';
        let historyEntry = { time: new Date().toLocaleTimeString() };

        const currentPlayerEl = document.getElementById('current-player');

        if (data.type === 'student') {
            playSfx('win');
            setStatus('success', i18n[currentLang].statusWinner);
            if (currentPlayerEl) {
                currentPlayerEl.innerText = (currentLang === 'en' ? 'Current player: ' : '目前玩家：') + data.name;
            }
            title.innerText = i18n[currentLang].titleWinner;
            title.style.color = '#333';
            display.innerHTML = `
                <div class="result-name">${data.name}</div>
                <div class="result-house-buttons">
                    <button id="btn-house-correct" class="btn-house">✅ 答對，建造房屋</button>
                    <button id="btn-house-wrong" class="btn-house btn-house-wrong">❌ 答錯</button>
                </div>
            `;
            box.style.borderColor = 'var(--monopoly-blue)';

            historyEntry.type = 'winner';
            historyEntry.text = `📍 <span style="color:var(--monopoly-blue);">${data.name}</span>`;

            const btnCorrect = document.getElementById('btn-house-correct');
            const btnWrong = document.getElementById('btn-house-wrong');
            if (btnCorrect) {
                btnCorrect.onclick = () => handleCorrectAnswer(data.id);
            }
            if (btnWrong) {
                btnWrong.onclick = () => closeResult();
            }
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                zIndex: 3000
            });
        } else {
            playSfx('fate');
            const list = data.type === 'chance' ? chanceList : fateList;
            const content = list[Math.floor(Math.random() * list.length)];
            setStatus(data.type === 'chance' ? 'info' : 'warning', data.type === 'chance' ? i18n[currentLang].statusChance : i18n[currentLang].statusFate);
            title.innerText = data.type === 'chance' ? i18n[currentLang].titleChance : i18n[currentLang].titleFate;
            const color = data.type === 'chance' ? '#d97706' : '#dc2626';
            title.style.color = color;
            display.innerHTML = `<div class="result-text" style="color:${color}">${content}</div>`;
            box.style.borderColor = color;

            const typeStr = data.type === 'chance' ? '🎁 機會' : '⚡ 命運';
            historyEntry.type = data.type === 'chance' ? 'chance' : 'fate';
            historyEntry.text = `<span style="color:${color}">${typeStr}</span>：${content}`;
        }

        historyData.unshift(historyEntry);
        debouncedSave();
    }

    function closeResult() {
        document.getElementById('result-modal').style.display = 'none';
        isAnimating = false;
        setControlsEnabled(true);
    }

    function updateStudentHouses(studentId, delta) {
        const idKey = studentId;
        if (!studentHouses[idKey]) {
            studentHouses[idKey] = { small: 0, middle: 0, large: 0 };
        }
        const info = studentHouses[idKey];

        if (delta > 0) {
            for (let k = 0; k < delta; k++) {
                info.small = (info.small || 0) + 1;
                while (info.small >= 3) {
                    info.small -= 3;
                    info.middle = (info.middle || 0) + 1;
                }
                while (info.middle >= 3) {
                    info.middle -= 3;
                    info.large = (info.large || 0) + 1;
                }
            }
        } else if (delta < 0) {
            for (let k = 0; k < Math.abs(delta); k++) {
                if (info.small > 0) {
                    info.small -= 1;
                } else if (info.middle > 0) {
                    info.middle -= 1;
                    info.small += 2;
                } else if (info.large > 0) {
                    info.large -= 1;
                    info.middle += 2;
                }
            }
        }

        studentHouses[idKey] = info;
        return info;
    }

    function handleCorrectAnswer(studentId) {
        updateStudentHouses(studentId, 1);
        generateMap();
        renderBoard();

        const stu = students.find(s => s.id == studentId) || originalStudents.find(s => s.id == studentId);
        setStatus('success', i18n[currentLang].statusBuild || '');

        const nameText = stu ? stu.name : '';
        const timeStr = new Date().toLocaleTimeString();
        const historyText = currentLang === 'en'
            ? `🏠 ${nameText} built a house`
            : `🏠 ${nameText} 建造了一間房屋`;
        historyData.unshift({ time: timeStr, text: historyText, type: 'house' });

        closeResult();
        debouncedSave();
    }

    function openHouseEditor(studentId) {
        const stu = students.find(s => s.id == studentId) || originalStudents.find(s => s.id == studentId);
        if (!stu) return;

        const modal = document.getElementById('result-modal');
        const box = document.getElementById('result-box');
        const title = document.getElementById('result-title');
        const display = document.getElementById('result-display');

        modal.style.display = 'flex';
        title.innerText = currentLang === 'en' ? '🏠 Edit Houses' : '🏠 調整房屋';
        title.style.color = '#333';

        display.innerHTML = `
            <div class="result-name">${stu.name}</div>
            <div class="result-house-buttons">
                <button id="btn-house-plus" class="btn-house">+ 房屋</button>
                <button id="btn-house-minus" class="btn-house btn-house-wrong">- 房屋</button>
            </div>
        `;
        box.style.borderColor = 'var(--monopoly-blue)';

        document.getElementById('btn-house-plus').onclick = () => {
            updateStudentHouses(studentId, 1);
            generateMap();
            renderBoard();
            debouncedSave();
        };
        document.getElementById('btn-house-minus').onclick = () => {
            updateStudentHouses(studentId, -1);
            generateMap();
            renderBoard();
            debouncedSave();
        };
    }

    function shuffleBoard() {
        if (isAnimating) return;
        playSfx('blow');
        closeResult();
        students.sort(() => Math.random() - 0.5);
        generateMap();
        renderBoard();
        setStatus('info', i18n[currentLang].statusShuffle);
    }

    function resetBoard() {
        if (isAnimating) return;
        playSfx('click');
        closeResult();
        students = JSON.parse(JSON.stringify(originalStudents));
        currentIndex = 0;
        generateMap();
        renderBoard();
        setStatus('normal', i18n[currentLang].ready);
        const currentPlayerEl = document.getElementById('current-player');
        if (currentPlayerEl) currentPlayerEl.innerText = '';
    }

    function updateToolbarTitles() {
        const langData = i18n[currentLang];
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnReset = document.getElementById('btn-reset');
        const btnHistory = document.getElementById('btn-history');
        const btnSettings = document.getElementById('btn-settings');

        if (btnShuffle && langData.btnShuffle) btnShuffle.title = langData.btnShuffle;
        if (btnReset && langData.btnReset) btnReset.title = langData.btnReset;
        if (btnHistory && langData.btnHistory) btnHistory.title = langData.btnHistory;
        if (btnSettings && langData.btnSettings) btnSettings.title = langData.btnSettings;
    }

    function setStatus(type, text) {
        const el = document.getElementById('status-text');
        if (!el) return;
        el.innerText = text;
        el.classList.remove('status-normal', 'status-success', 'status-info', 'status-warning', 'status-danger');
        el.classList.add(`status-${type || 'normal'}`);
    }

    function setControlsEnabled(enabled) {
        const ids = ['btn-roll', 'btn-marquee', 'btn-shuffle', 'btn-reset', 'btn-history', 'btn-settings'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.disabled = !enabled;
        });
    }

    function changeLanguage(lang) {
        currentLang = lang;
        document.body.style.fontFamily = (lang === 'en') ? 'var(--font-en)' : 'var(--font-zh)';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (i18n[lang][key]) el.placeholder = i18n[lang][key];
        });
        updateToolbarTitles();
        updateCloudStatusText();
        setStatus('normal', i18n[lang].ready);
        generateMap();
        renderBoard();
        debouncedSave();
    }

    // ==========================================
    // 啟動：檢查現有 session
    // ==========================================
    (async function bootstrap() {
        const { data: { session } } = await sb.auth.getSession();
        if (session && session.user) {
            currentUser = session.user;
            await onAuthSuccess();
        } else {
            showAuthForm('login');
            updateCloudStatusText();
            initGame();
        }
    })();
</script>
