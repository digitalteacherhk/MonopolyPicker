<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Monopoly Picker</title>\n</head>\n<body>\n    <h1>Welcome to the Monopoly Picker!</h1>\n    \n    <!-- Audio Elements -->\n    <audio id="diceRollSound" src="path/to/dice-roll.mp3"></audio>\n    <audio id="winningSound" src="path/to/winning.mp3"></audio>\n    <audio id="chanceSound" src="path/to/chance.mp3"></audio>\n    <audio id="fateSound" src="path/to/fate.mp3"></audio>\n    \n    <script>\n        function playSound(soundId) {\n            const sound = document.getElementById(soundId);\n            if (sound) {\n                sound.currentTime = 0; // rewind to start\n                sound.play();\n            }\n        }\n        \n        // Usage examples - you can replace these with actual game events\n        // playSound('diceRollSound');\n        // playSound('winningSound');\n        // playSound('chanceSound');\n        // playSound('fateSound');\n    <\/script>\n</body>\n</html>
